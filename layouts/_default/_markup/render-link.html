{{- $url := .Destination -}}
{{- $external := or (strings.HasPrefix $url "http") (strings.HasPrefix $url "mailto:") (strings.HasPrefix $url "tel:") (strings.HasPrefix $url "#") -}}
<a href="{{ if $external }}{{ $url | safeURL }}{{ else }}{{ $url | strings.TrimPrefix "/" | relURL | safeURL }}{{ end }}"{{ with .Title }} title="{{ . }}"{{ end }}>{{ .Text | safeHTML }}</a>
